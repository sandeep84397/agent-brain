<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Brain Office — 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="office3d.css">

    <!--
        Three.js loaded as ES module via importmap — no build step.
        Three's "addons" subpath gives us OrbitControls without extra plumbing.
    -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="app">
        <div id="scene-container">
            <canvas id="office3d"></canvas>
            <!-- HTML overlays positioned in screen-space by office3d.js — speech bubbles, status pips, name tags -->
            <div id="overlay-layer"></div>
            <div id="hud">
                <div id="title">
                    <h1>Agent Brain</h1>
                    <span class="subtitle">Office · 3D</span>
                </div>
                <div id="camera-hint">drag to orbit · scroll to zoom</div>
            </div>
        </div>
        <aside id="sidebar">
            <div id="sidebar-header">
                <h2>Activity</h2>
                <div id="connection-dot" class="disconnected" title="Connecting…"></div>
            </div>
            <div id="chat-log">
                <div class="empty-chat">No messages yet</div>
            </div>
            <div id="agent-list">
                <h3>Team</h3>
                <div id="agent-entries">
                    <div class="empty-team">Waiting for agents…</div>
                </div>
            </div>
            <div id="status-bar">
                <span id="agent-count">Connecting…</span>
                <span id="last-update"></span>
            </div>
        </aside>
    </div>
    <script type="module" src="office3d.js"></script>
</body>
</html>
